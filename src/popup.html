<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Video Item Remover</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #212121;
      color: #f1f1f1;
      font-family: Roboto, Arial, sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #3f3f3f;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
    }

    #clear-all {
      background: none;
      border: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 120ms, background 120ms;
    }

    #clear-all:hover:not(:disabled) {
      color: #ff4e45;
      background: rgba(255, 78, 69, 0.1);
    }

    #clear-all:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #channel-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 4px 0;
    }

    .empty {
      padding: 20px 14px;
      color: #aaa;
      line-height: 1.6;
      text-align: center;
    }

    .channel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 14px;
      transition: background 80ms;
    }

    .channel-item:hover { background: #2f2f2f; }

    .channel-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .unblock-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid #555;
      color: #aaa;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 120ms, color 120ms;
    }

    .unblock-btn:hover {
      border-color: #ff4e45;
      color: #ff4e45;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Blocked Channels</h1>
    <button id="clear-all" disabled>Clear all</button>
  </div>
  <div id="channel-list"></div>
  <script src="popup.js"></script>
</body>
</html>
